name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: kb-linux-x86_64.tar.gz
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            archive: kb-macos-x86_64.tar.gz
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            archive: kb-macos-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/pkg
          cp "target/${{ matrix.target }}/release/kb" dist/pkg/kb
          chmod +x dist/pkg/kb

          tar -C dist/pkg -czf "dist/${{ matrix.archive }}" kb

          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${{ matrix.archive }}" >"dist/${{ matrix.archive }}.sha256"
          else
            sha256sum "dist/${{ matrix.archive }}" >"dist/${{ matrix.archive }}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find dist -maxdepth 2 -type f -print0 | xargs -0 -I{} cp "{}" out/
          cat out/*.sha256 >out/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.tar.gz
            out/*.sha256
            out/SHA256SUMS.txt
          generate_release_notes: true
